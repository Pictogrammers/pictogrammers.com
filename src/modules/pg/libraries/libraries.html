<template>
  <section id="libraries">
    <h2>Our Icon Libraries</h2>
    <div class="libraries">
      <template for:each={libraries} for:item="library">
        <pg-library-card
          key={library.id}
          name={library.name}
          description={library.description}
          image={library.image}
          link={library.link}
        ></pg-library-card>
      </template>
    </div>
  </section>
</template>
