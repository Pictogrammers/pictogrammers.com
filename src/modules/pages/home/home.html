<template>
  <pg-header></pg-header>
  <pg-hero full-height show-scroll-cta>
    <h1 slot="heading">Open-source iconography for designers and developers</h1>
    <p slot="subheading">We're a collective of passionate individuals creating beautiful icon libraries for drop-in use in your designs and development.</p>
  </pg-hero>
  <main>
    <pg-section
      data-location="users"
      initial-wave
    >
      <div class="users">
        <div class="logos">
          <img src="/resources/ambrook.svg" alt="Ambrook" />
          <img src="/resources/accusoft.svg" alt="Accusoft" />
          <img src="/resources/home-assistant.svg" alt="Home Assistant" />
          <img src="/resources/nabu-casa.svg" alt="Nabu Casa" />
          <img src="/resources/progressive-leasing.svg" alt="Progressive Leasing" />
          <img src="/resources/ontask.svg" alt="OnTask" />
        </div>
        <p>From open-source software to industry leaders,<br/> the best teams use Pictogrammers’ libraries to build their apps.</p>
      </div>
    </pg-section>
    <pg-section
      class="about"
      data-location="about"
      title="Who are we?"
    >
      <ul if:true={contributors.length} class="contributors">
        <template for:each={contributors} for:item="contributor">
          <li key={contributor.id}>
            <img src={contributor.imageUri} alt={contributor.name} />
          </li>
        </template>
      </ul>
      <p>The Pictogrammers Icon Group is a diverse group of 100+ collaborators from all walks of life. Hailing from all corners of the globe, we come together to express ideas in a universal language so that all may benefit. Icons may be small, but they are powerful forms of communication in today’s digital age. Built on our passion for beautiful and simple design, we strive to make iconography easily accessible for whatever your use case may be. From designers building prototypes to developers writing code, finding and implementing an icon should be a snap!</p>
    </pg-section>
    <pg-section
      data-location="libraries"
      title="Our Icon Libraries"
      highlight
    >
      <div class="libraries">
        <template for:each={libraries} for:item="library">
          <pg-library-card
            key={library.id}
            name={library.name}
            description={library.description}
            image={library.image}
            link={library.link}
          ></pg-library-card>
        </template>
      </div>
    </pg-section>
    <pg-section
      data-location="join"
      title="Join Us"
    >
      <div class="join">
        <p>If you're looking to get involved with the Pictogrammers Icon Group, there are many ways you can help! You can tackle <a href="https://github.com/Templarian/MaterialDesign/issues" rel="nofollow noreferrer" target="_blank">issues and icon requests</a> on one of our libraries. You can <a href="https://github.com/Pictogrammers/Icon-Site/tree/master/src/content" rel="nofollow noreferrer" target="_blank">write and update documentation</a> to help those looking to get started. Interested in writing an integration we don't have... <a href="https://dev.materialdesignicons.com/contribute/third-party-guide" rel="nofollow noreferrer" target="_blank">Go for it!</a><br/><br/>If you have any questions about how you can make an impact, reach out to us on <a href="https://twitter.com/pictogrammers" rel="nofollow noreferrer" target="_blank">Twitter</a> or open a <a href="https://github.com/Templarian/MaterialDesign/issues/new?assignees=&labels=Question&template=6_question.yml" rel="nofollow noreferrer" target="_blank">GitHub issue</a>. We look forward to meeting you!</p>
        <pg-icon class="crowd" color="#696969" path={icon.mdiCrowd} size="12"></pg-icon>
      </div>
    </pg-section>
  </main>
  <pg-footer></pg-footer>
</template>
