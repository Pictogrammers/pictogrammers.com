<template>
  <pg-header></pg-header>
  <pg-hero>
    <h1 slot="heading">Brand Guidelines</h1>
  </pg-hero>
  <main>
    <pg-section class="logo" title="Logo" initial-wave>
      <img src="/resources/pictogrammers.svg" alt="Pictogrammers Logo" />
      <p>
        The Pictogrammers logo is the central visual identity for the
        Pictogrammers Icon Group. The monogram was created by
        <a
          href="https://twitter.com/templarian"
          rel="nofollow noreferrer"
          target="_blank"
          >Austin Andrews</a
        >
        in 2020. The following year, the wordmark was added by
        <a
          href="https://twitter.com/mririgo"
          rel="nofollow noreferrer"
          target="_blank"
          >Michael Irigoyen</a
        >, completing the logo.
      </p>
      <pg-button
        href="/resources/brand/pictogrammers-brand-assets.zip"
        end-icon={icon.mdiArrowDown}
      >
        Download Logo Assets
      </pg-button>
    </pg-section>
    <pg-section title="Color">
      <p>
        Our primary color palette is Pictogrammers Purple on a white background.
      </p>
      <div class="swatches">
        <div class="swatch purple">
          <h3>Pictogrammers Purple</h3>
          <div class="values">
            <p>HEX<br />#520065</p>
            <p>RGB<br />82 0 101</p>
            <p>CMYK<br />78 100 24 22</p>
          </div>
        </div>
        <div class="swatch white">
          <h3>White</h3>
          <div class="values">
            <p>HEX<br />#FFF</p>
            <p>RGB<br />255 255 255</p>
            <p>CMYK<br />0 0 0 0</p>
          </div>
        </div>
      </div>
    </pg-section>
    <pg-section title="Clearing Space">
      <p>
        The minimum clearing space of the logo is the width of the P in
        Pictorgrammers.
      </p>
      <div class="space">
        <div class="space-logos">
          <img
            src="/resources/brand/clearing-space-guide.png"
            alt="Pictogrammers logo with clearing space guides"
          />
          <img
            src="/resources/brand/clearing-space.png"
            alt="Pictogrammers logo with clearing space example"
          />
        </div>
        <div class="space-monos">
          <img
            src="/resources/brand/clearing-space-monogram-guide.png"
            alt="Pictogrammers monogram with clearing space guides"
          />
          <img
            src="/resources/brand/clearing-space-monogram.png"
            alt="Pictogrammers monogram with clearing space example"
          />
        </div>
      </div>
    </pg-section>
    <pg-section title="Logo on Color">
      <p>
        In some situations, the logo can be used on a colored background as long
        as there is a 5:1 contrast ratio. Anything less is not recommended.
        <a
          href="https://webaim.org/resources/contrastchecker/"
          rel="nofollow noreferrer"
          target="_blank"
          >Check color contrasts here.</a
        >
      </p>
      <div class="logo-on-color">
        <img
          src="/resources/pictogrammers.svg"
          alt="Pictogrammers Logo on White Background"
          class="back-white"
        />
        <img
          src="/resources/pictogrammers.svg"
          alt="Pictogrammers Logo on Yellow Background"
          class="back-yellow"
        />
        <img
          src="/resources/pictogrammers.svg"
          alt="Pictogrammers Logo on Purple Background"
          class="back-purple"
        />
        <img
          src="/resources/pictogrammers.svg"
          alt="Pictogrammers Logo on Green Background"
          class="back-green"
        />
      </div>
      <p>
        In cases where the logo must display or print in a single color, there
        is an entirely white or black logo.
      </p>
      <div class="logo-on-color">
        <img
          src="/resources/brand/logos/pictogrammers-full-black.svg"
          alt="Pictogrammers Logo in Black on White Background"
          class="back-white"
        />
        <img
          src="/resources/brand/logos/pictogrammers-full-white.svg"
          alt="Pictogrammers Logo in White on Black Background"
          class="back-black"
        />
      </div>
    </pg-section>
    <pg-section title="Wordmark">
      <p>
        The Pictogrammers wordmark may exist without the monogram. The typeface
        used to set the logo wordmark is
        <a
          href="https://manropefont.com/"
          rel="nofollow noreferrer"
          target="_blank"
          >Manrope</a
        >. The wordmark is optically kerned and its uppercase "P" is customized
        to mirror the monogram.
      </p>
      <figure class="wordmark">
        <img
          src="/resources/brand/wordmark.png"
          alt="Manual kerning and custom 'P' vs. Manrope"
        />
        <figcaption>
          <span>Manual kerning and custom "P"</span> vs. Manrope
        </figcaption>
      </figure>
    </pg-section>
    <pg-section title="Monogram">
      <p>
        We use the monogram for our GitHub account, social media profile images,
        and as our "favicon" on our official site. The monogram may be used in
        cases where the association with Pictogrammers is clearly evident.
      </p>
      <div class="monogram-sizes">
        <figure class="size-128">
          <img
            src="/resources/brand/logos/pictogrammers-monogram.svg"
            alt="Pictogrammers monogram at 128px"
          />
          <figcaption>128px</figcaption>
        </figure>
        <figure class="size-64">
          <img
            src="/resources/brand/logos/pictogrammers-monogram.svg"
            alt="Pictogrammers monogram at 64px"
          />
          <figcaption>64px</figcaption>
        </figure>
        <figure class="size-32">
          <img
            src="/resources/brand/logos/pictogrammers-monogram.svg"
            alt="Pictogrammers monogram at 32px"
          />
          <figcaption>32px</figcaption>
        </figure>
        <figure class="size-16">
          <img
            src="/resources/brand/logos/pictogrammers-monogram.svg"
            alt="Pictogrammers monogram at 16px"
          />
          <figcaption>16px</figcaption>
        </figure>
      </div>
    </pg-section>
    <pg-section title="Icon Library Logos">
      <p>
        Each of our icon libraries maintain their own visual identity in terms
        of logo and color. Please show them the same care and respect as the
        Pictogrammers monogram.
      </p>
      <div class="library mdi">
        <img src="/resources/mdi.svg" alt="Material Design Icons logo" />
        <div class="swatch">
          <h3>Material Design Icons</h3>
          <div class="values">
            <p>HEX<br />#2196F3</p>
            <p>RGB<br />33 150 243</p>
            <p>CMYK<br />82 36 0 5</p>
          </div>
        </div>
      </div>
      <div class="library mdl">
        <img src="/resources/mdl.svg" alt="Material Design Light logo" />
        <div class="swatch">
          <h3>Material Design Light</h3>
          <div class="values">
            <p>HEX<br />#5A88AD</p>
            <p>RGB<br />90 136 173</p>
            <p>CMYK<br />33 15 0 32</p>
          </div>
        </div>
      </div>
    </pg-section>
    <pg-section title="Guidance">
      <p>
        Please maintain consistency of our brand by not misusing the
        Pictogrammers logo, monogram, wordmark, or any of our various icon
        library logos. If you have a question about whether your use of our logo
        is accepted, please
        <a
          href="https://twitter.com/pictogrammers"
          rel="nofollow noreferrer"
          target="_blank"
          >get in touch</a
        >.
      </p>
      <div class="rules">
        <figure>
          <img
            src="/resources/brand/busy-back.png"
            alt="Pictogrammers logo on a busy background"
          />
          <figcaption>Do not place the logo on busy backgrounds.</figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/alter-color.png"
            alt="Pictogrammers logo with altered colors"
          />
          <figcaption>Do not alter the logo colors.</figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/wordmark-recreate.png"
            alt="Pictogrammers logo with recreated wordmark"
          />
          <figcaption>Do not recreate the wordmark in Manrope.</figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/wordmark-replace.png"
            alt="Pictogrammers logo with manipulated wordmark"
          />
          <figcaption>
            Do not change the typeface or manipulate the wordmark.
          </figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/adjusted-size.png"
            alt="Pictogrammers logo with adjusted sizes"
          />
          <figcaption>
            Do not adjust or reconfigure the size or placement of any logo
            elements.
          </figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/distorted.png"
            alt="Pictogrammers logo with distortions"
          />
          <figcaption>
            Do not rotate, skew, stretch, or distort the logo.
          </figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/shadowed.png"
            alt="Pictogrammers logo with a shadow"
          />
          <figcaption>
            Do not apply bevel, shadow, or other effects to the logo.
          </figcaption>
        </figure>
        <figure>
          <img
            src="/resources/brand/cropped.png"
            alt="Pictogrammers logo with a section cropped"
          />
          <figcaption>Do not cut the logo.</figcaption>
        </figure>
      </div>
    </pg-section>
  </main>
  <pg-footer></pg-footer>
</template>
